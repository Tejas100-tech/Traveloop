openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Traveloop API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: Auth
    description: Browser and mobile authentication endpoints.
  - name: trips
    description: Trip management
  - name: stops
    description: Itinerary stops
  - name: activities
    description: Stop activities
  - name: cities
    description: City discovery
  - name: packing
    description: Packing checklists
  - name: notes
    description: Trip notes and journal
  - name: dashboard
    description: Dashboard and summaries

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'

  /login:
    get:
      tags: [Auth]
      operationId: beginBrowserLogin
      summary: Start the browser OIDC login flow
      parameters:
        - name: returnTo
          in: query
          required: false
          schema:
            type: string
      responses:
        '302':
          description: Redirect to the OIDC authorization endpoint.

  /callback:
    get:
      tags: [Auth]
      operationId: handleBrowserLoginCallback
      summary: Complete the browser OIDC login flow
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: iss
          in: query
          required: false
          schema:
            type: string
            format: uri
      responses:
        '302':
          description: Redirect after login.

  /logout:
    get:
      tags: [Auth]
      operationId: logoutBrowserSession
      summary: Clear the session and begin OIDC logout
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '302':
          description: Redirect to the OIDC provider logout URL.

  /mobile-auth/token-exchange:
    post:
      tags: [Auth]
      operationId: exchangeMobileAuthorizationCode
      summary: Exchange a mobile OIDC code for a session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileTokenExchangeRequest'
      responses:
        '200':
          description: Session created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileTokenExchangeSuccess'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Token did not contain usable claims.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Token exchange failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /mobile-auth/logout:
    post:
      tags: [Auth]
      operationId: logoutMobileSession
      summary: Delete a mobile session token
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
      responses:
        '200':
          description: Logout processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccess'

  /users/me:
    patch:
      operationId: updateCurrentUser
      tags: [Auth]
      summary: Update the current user's profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserBody'
      responses:
        '200':
          description: Updated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUser'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    delete:
      operationId: deleteCurrentUser
      tags: [Auth]
      summary: Delete the current user's account and all data
      responses:
        '204':
          description: Account deleted
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /users/me/photo:
    post:
      operationId: uploadProfilePhoto
      tags: [Auth]
      summary: Upload a profile photo via Cloudinary
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadPhotoBody'
      responses:
        '200':
          description: Photo uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadPhotoResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /trips/shared/{shareSlug}/copy:
    post:
      operationId: copySharedTrip
      tags: [trips]
      summary: Copy a public shared trip to the current user's account
      parameters:
        - name: shareSlug
          in: path
          required: true
          schema:
            type: string
      responses:
        '201':
          description: Trip copied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Trip'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Trip not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /dashboard:
    get:
      operationId: getDashboard
      tags: [dashboard]
      summary: Get dashboard summary for the current user
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /trips:
    get:
      operationId: listTrips
      tags: [trips]
      summary: List all trips for the current user
      responses:
        "200":
          description: List of trips
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Trip"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    post:
      operationId: createTrip
      tags: [trips]
      summary: Create a new trip
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TripInput"
      responses:
        "201":
          description: Created trip
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trip"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /trips/{tripId}:
    get:
      operationId: getTrip
      tags: [trips]
      summary: Get a trip by ID
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Trip details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TripWithStops"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    patch:
      operationId: updateTrip
      tags: [trips]
      summary: Update a trip
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TripUpdate"
      responses:
        "200":
          description: Updated trip
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trip"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    delete:
      operationId: deleteTrip
      tags: [trips]
      summary: Delete a trip
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /trips/shared/{shareSlug}:
    get:
      operationId: getSharedTrip
      tags: [trips]
      summary: Get a shared/public trip by its share slug
      parameters:
        - name: shareSlug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Public trip view
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TripWithStops"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /trips/{tripId}/stops:
    get:
      operationId: listStops
      tags: [stops]
      summary: List stops for a trip
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of stops
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Stop"
    post:
      operationId: createStop
      tags: [stops]
      summary: Add a stop to a trip
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StopInput"
      responses:
        "201":
          description: Created stop
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Stop"

  /trips/{tripId}/stops/{stopId}:
    patch:
      operationId: updateStop
      tags: [stops]
      summary: Update a stop
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: integer
        - name: stopId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StopUpdate"
      responses:
        "200":
          description: Updated stop
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Stop"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    delete:
      operationId: deleteStop
      tags: [stops]
      summary: Remove a stop from a trip
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: integer
        - name: stopId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /stops/{stopId}/activities:
    get:
      operationId: listActivities
      tags: [activities]
      summary: List activities for a stop
      parameters:
        - name: stopId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of activities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Activity"
    post:
      operationId: createActivity
      tags: [activities]
      summary: Add an activity to a stop
      parameters:
        - name: stopId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ActivityInput"
      responses:
        "201":
          description: Created activity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Activity"

  /stops/{stopId}/activities/{activityId}:
    patch:
      operationId: updateActivity
      tags: [activities]
      summary: Update an activity
      parameters:
        - name: stopId
          in: path
          required: true
          schema:
            type: integer
        - name: activityId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ActivityUpdate"
      responses:
        "200":
          description: Updated activity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Activity"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    delete:
      operationId: deleteActivity
      tags: [activities]
      summary: Remove an activity from a stop
      parameters:
        - name: stopId
          in: path
          required: true
          schema:
            type: integer
        - name: activityId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /cities:
    get:
      operationId: searchCities
      tags: [cities]
      summary: Search available cities
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of cities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/City"

  /cities/{cityId}/activity-templates:
    get:
      operationId: listCityActivityTemplates
      tags: [cities]
      summary: List activity templates for a city
      parameters:
        - name: cityId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of activity templates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityTemplate"

  /trips/{tripId}/budget:
    get:
      operationId: getTripBudget
      tags: [trips]
      summary: Get cost breakdown for a trip
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Budget breakdown
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TripBudget"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /trips/{tripId}/packing:
    get:
      operationId: listPackingItems
      tags: [packing]
      summary: List packing items for a trip
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Packing items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PackingItem"
    post:
      operationId: createPackingItem
      tags: [packing]
      summary: Add a packing item
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PackingItemInput"
      responses:
        "201":
          description: Created packing item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PackingItem"

  /trips/{tripId}/packing/{itemId}:
    patch:
      operationId: updatePackingItem
      tags: [packing]
      summary: Update a packing item
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: integer
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PackingItemUpdate"
      responses:
        "200":
          description: Updated packing item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PackingItem"
    delete:
      operationId: deletePackingItem
      tags: [packing]
      summary: Delete a packing item
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: integer
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /trips/{tripId}/notes:
    get:
      operationId: listNotes
      tags: [notes]
      summary: List notes for a trip
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of notes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Note"
    post:
      operationId: createNote
      tags: [notes]
      summary: Create a note for a trip
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NoteInput"
      responses:
        "201":
          description: Created note
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Note"

  /trips/{tripId}/notes/{noteId}:
    patch:
      operationId: updateNote
      tags: [notes]
      summary: Update a note
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: integer
        - name: noteId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NoteUpdate"
      responses:
        "200":
          description: Updated note
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Note"
    delete:
      operationId: deleteNote
      tags: [notes]
      summary: Delete a note
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: integer
        - name: noteId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

components:
  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      description: Opaque session token — `Bearer <sid>`.
      schema:
        type: string
    SessionCookie:
      name: sid
      in: cookie
      required: false
      description: Browser session cookie.
      schema:
        type: string

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    AuthUser:
      type: object
      required: [id, email, firstName, lastName, profileImageUrl]
      properties:
        id:
          type: string
        email:
          type: [string, 'null']
          format: email
        firstName:
          type: [string, 'null']
        lastName:
          type: [string, 'null']
        profileImageUrl:
          type: [string, 'null']

    AuthUserEnvelope:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: '#/components/schemas/AuthUser'
            - type: 'null'

    MobileTokenExchangeRequest:
      type: object
      required: [code, code_verifier, redirect_uri, state]
      properties:
        code:
          type: string
          minLength: 1
        code_verifier:
          type: string
          minLength: 1
        redirect_uri:
          type: string
          minLength: 1
          format: uri
        state:
          type: string
          minLength: 1
        nonce:
          type: string
          minLength: 1

    MobileTokenExchangeSuccess:
      type: object
      required: [token]
      properties:
        token:
          type: string

    LogoutSuccess:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          const: true

    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string

    Trip:
      type: object
      required: [id, userId, name, startDate, endDate, isPublic, shareSlug, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: string
        name:
          type: string
        description:
          type: ["string", "null"]
        coverPhoto:
          type: ["string", "null"]
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        isPublic:
          type: boolean
        shareSlug:
          type: string
        totalBudget:
          type: ["number", "null"]
        stopCount:
          type: ["integer", "null"]
        createdAt:
          type: string
          format: date-time

    TripInput:
      type: object
      required: [name, startDate, endDate]
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
        coverPhoto:
          type: string
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        isPublic:
          type: boolean
        totalBudget:
          type: number

    TripUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
        coverPhoto:
          type: string
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        isPublic:
          type: boolean
        totalBudget:
          type: number

    Stop:
      type: object
      required: [id, tripId, cityName, country, orderIndex, startDate, endDate, createdAt]
      properties:
        id:
          type: integer
        tripId:
          type: integer
        cityName:
          type: string
        country:
          type: string
        region:
          type: ["string", "null"]
        orderIndex:
          type: integer
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    StopInput:
      type: object
      required: [cityName, country, startDate, endDate]
      properties:
        cityName:
          type: string
          minLength: 1
        country:
          type: string
          minLength: 1
        region:
          type: string
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        notes:
          type: string
        orderIndex:
          type: integer

    StopUpdate:
      type: object
      properties:
        cityName:
          type: string
          minLength: 1
        country:
          type: string
        region:
          type: string
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        notes:
          type: string
        orderIndex:
          type: integer

    Activity:
      type: object
      required: [id, stopId, name, type, createdAt]
      properties:
        id:
          type: integer
        stopId:
          type: integer
        name:
          type: string
        type:
          type: string
        description:
          type: ["string", "null"]
        cost:
          type: ["number", "null"]
        duration:
          type: ["integer", "null"]
        scheduledDate:
          type: ["string", "null"]
          format: date
        imageUrl:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    ActivityInput:
      type: object
      required: [name, type]
      properties:
        name:
          type: string
          minLength: 1
        type:
          type: string
        description:
          type: string
        cost:
          type: number
        duration:
          type: integer
        scheduledDate:
          type: string
          format: date
        imageUrl:
          type: string

    ActivityUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        type:
          type: string
        description:
          type: string
        cost:
          type: number
        duration:
          type: integer
        scheduledDate:
          type: string
          format: date
        imageUrl:
          type: string

    City:
      type: object
      required: [id, name, country]
      properties:
        id:
          type: integer
        name:
          type: string
        country:
          type: string
        region:
